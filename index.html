    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      window.onload = function() {
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
      };
      function showErrorOverlay(msg, details) {
        if (msg && msg.toString().includes('WebSocket')) return; // Ignore benign Vite HMR errors
        var div = document.createElement('div');
        div.style.cssText = 'position: fixed; bottom: 10px; right: 10px; max-width: 400px; padding: 15px; background: #fee2e2; color: #991b1b; font-family: sans-serif; z-index: 9999; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 12px; overflow-wrap: break-word;';
        div.innerHTML = '<strong>Error:</strong> ' + msg + '<br><pre style="margin-top: 8px; max-height: 150px; overflow: auto;">' + details + '</pre><button onclick="this.parentElement.remove()" style="margin-top: 8px; padding: 4px 8px; cursor: pointer;">Dismiss</button>';
        document.body.appendChild(div);
      }
      window.onerror = function(message, source, lineno, colno, error) {
        showErrorOverlay(message, source + ':' + lineno + ':' + colno + '\n' + (error && error.stack ? error.stack : ''));
      };
      window.addEventListener('unhandledrejection', function(event) {
        showErrorOverlay(event.reason, event.reason && event.reason.stack ? event.reason.stack : '');
      });
    </script>
